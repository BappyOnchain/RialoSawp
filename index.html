<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yeldra Admin Panel</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0B0E14;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 480px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo img {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .logo h1 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #00F0FF, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      color: #6B7280;
      font-size: 13px;
      margin-top: 4px;
    }
    .card {
      background: #131720;
      border: 1px solid #1E2433;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      color: #6B7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1E2433;
      font-size: 14px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #6B7280; }
    .stat-value { font-weight: 600; color: #fff; }
    .stat-value.cyan { color: #00F0FF; }
    .stat-value.green { color: #4ADE80; }
    .stat-value.red { color: #F87171; }
    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: #9CA3AF;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      background: #0B0E14;
      border: 1px solid #1E2433;
      border-radius: 12px;
      padding: 12px 16px;
      gap: 10px;
    }
    .input-wrap:focus-within {
      border-color: #00F0FF;
    }
    .input-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
    }
    .input-wrap input::placeholder { color: #374151; }
    .input-wrap span {
      color: #6B7280;
      font-size: 13px;
      font-weight: 600;
    }
    .apr-preview {
      background: #0B0E14;
      border: 1px solid #1E2433;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #6B7280;
      margin-bottom: 16px;
      text-align: center;
    }
    .apr-preview strong {
      color: #00F0FF;
      font-size: 16px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-gradient {
      background: linear-gradient(135deg, #00F0FF, #8B5CF6);
      color: #0B0E14;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #1E2433;
      color: #fff;
    }
    .wallet-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #131720;
      border: 1px solid #1E2433;
      border-radius: 100px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 16px;
      width: 100%;
      justify-content: center;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6B7280;
    }
    .dot.green { background: #4ADE80; }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      left: 20px;
      max-width: 400px;
      margin: 0 auto;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .toast.show { display: flex; }
    .toast.success { background: #14532D; border: 1px solid #4ADE80; color: #4ADE80; }
    .toast.error { background: #450A0A; border: 1px solid #F87171; color: #F87171; }
    .toast.info { background: #0C1A2E; border: 1px solid #00F0FF; color: #00F0FF; }
    .toast a { color: inherit; text-decoration: underline; font-size: 12px; display: block; margin-top: 2px; }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .warning {
      background: #1C1400;
      border: 1px solid #CA8A04;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #FDE047;
      margin-bottom: 16px;
    }
    .divider {
      height: 1px;
      background: #1E2433;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">
    <img src="https://i.postimg.cc/nhSSNc9S/IMG-20260702-175620.png" alt="Yeldra" onerror="this.style.display='none'" />
    <h1>Yeldra Admin</h1>
    <p>Owner-only reward management panel</p>
  </div>

  <!-- Wallet Connect -->
  <button class="wallet-pill" id="walletBtn" onclick="connectWallet()">
    <span class="dot" id="walletDot"></span>
    <span id="walletText">Connect Owner Wallet</span>
  </button>

  <!-- Protocol Stats -->
  <div class="card">
    <div class="card-title">Protocol Stats</div>
    <div class="stat-row">
      <span class="stat-label">Total Staked</span>
      <span class="stat-value cyan" id="totalStaked">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Current APR</span>
      <span class="stat-value" id="currentAPR">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Reward Period</span>
      <span class="stat-value" id="rewardPeriod">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Your USDC Balance</span>
      <span class="stat-value green" id="ownerBalance">—</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Protocol Status</span>
      <span class="stat-value" id="protocolStatus">—</span>
    </div>
  </div>

  <!-- Fund Rewards -->
  <div class="card">
    <div class="card-title">Fund Rewards</div>

    <div class="warning">
      ⚠️ Make sure you have enough USDC in your wallet before funding.
    </div>

    <div class="input-group">
      <label>Reward Amount</label>
      <div class="input-wrap">
        <input type="number" id="rewardAmount" placeholder="20" min="1" oninput="updatePreview()" />
        <span>USDC</span>
      </div>
    </div>

    <div class="input-group">
      <label>Duration</label>
      <div class="input-wrap">
        <input type="number" id="rewardDays" placeholder="3" min="1" oninput="updatePreview()" />
        <span>Days</span>
      </div>
    </div>

    <div class="apr-preview" id="aprPreview">
      Enter amount and days to preview APR
    </div>

    <button class="btn btn-gradient" id="fundBtn" onclick="fundRewards()" disabled>
      Fund Rewards
    </button>

    <div class="divider"></div>

    <div class="card-title">Danger Zone</div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-outline" onclick="pauseProtocol()" id="pauseBtn" disabled style="flex:1">
        Pause
      </button>
      <button class="btn btn-outline" onclick="unpauseProtocol()" id="unpauseBtn" disabled style="flex:1">
        Unpause
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toastMsg"></span>
</div>

<script>
  const CONTRACT_ADDRESS = '0x9bD14eA64dEA9b130f7978b1D0498cc013427EBB'
  const USDC_ADDRESS = '0x1c7D4B196Cb0C7B01d743Fbc6116a902379C7238'
  const SEPOLIA_CHAIN_ID = 11155111
  const SEPOLIA_CHAIN_ID_HEX = '0xaa36a7'
  const EXPLORER = 'https://sepolia.etherscan.io'

  const STAKING_ABI = [
    'function totalStaked() view returns (uint256)',
    'function currentAPR() view returns (uint256)',
    'function periodFinish() view returns (uint256)',
    'function paused() view returns (bool)',
    'function notifyRewardAmount(uint256 reward, uint256 duration) external',
    'function pause() external',
    'function unpause() external',
    'function owner() view returns (address)',
  ]

  const ERC20_ABI = [
    'function balanceOf(address) view returns (uint256)',
    'function approve(address, uint256) external returns (bool)',
    'function decimals() view returns (uint8)',
  ]

  let provider, signer, account

  function showToast(msg, type = 'info', txHash = null) {
    const t = document.getElementById('toast')
    const m = document.getElementById('toastMsg')
    t.className = `toast show ${type}`
    m.innerHTML = msg + (txHash ? `<a href="${EXPLORER}/tx/${txHash}" target="_blank">View on Etherscan ↗</a>` : '')
    setTimeout(() => t.classList.remove('show'), 6000)
  }

  function setBtn(id, text, disabled) {
    const btn = document.getElementById(id)
    btn.innerHTML = text
    btn.disabled = disabled
  }

  async function connectWallet() {
    if (!window.ethereum) return showToast('No wallet found. Install MetaMask or Rabby.', 'error')
    try {
      await window.ethereum.request({ method: 'eth_requestAccounts' })
      const p = new ethers.BrowserProvider(window.ethereum)
      const network = await p.getNetwork()

      if (Number(network.chainId) !== SEPOLIA_CHAIN_ID) {
        try {
          await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: SEPOLIA_CHAIN_ID_HEX }] })
        } catch (e) {
          if (e.code === 4902) {
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [{ chainId: SEPOLIA_CHAIN_ID_HEX, chainName: 'Sepolia Testnet', nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 }, rpcUrls: ['https://rpc.sepolia.org'], blockExplorerUrls: [EXPLORER] }]
            })
          }
        }
      }

      provider = new ethers.BrowserProvider(window.ethereum)
      signer = await provider.getSigner()
      account = await signer.getAddress()

      document.getElementById('walletDot').className = 'dot green'
      document.getElementById('walletText').textContent = account.slice(0, 6) + '...' + account.slice(-4)
      document.getElementById('fundBtn').disabled = false
      document.getElementById('pauseBtn').disabled = false
      document.getElementById('unpauseBtn').disabled = false

      await loadStats()
      showToast('Wallet connected!', 'success')
    } catch (e) {
      showToast(e.message || 'Connection failed', 'error')
    }
  }

  async function loadStats() {
    try {
      const contract = new ethers.Contract(CONTRACT_ADDRESS, STAKING_ABI, provider)
      const usdc = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, provider)

      const [totalStaked, apr, periodFinish, paused, balance] = await Promise.all([
        contract.totalStaked(),
        contract.currentAPR(),
        contract.periodFinish(),
        contract.paused(),
        account ? usdc.balanceOf(account) : 0n,
      ])

      document.getElementById('totalStaked').textContent = (Number(ethers.formatUnits(totalStaked, 6))).toLocaleString() + ' USDC'
      document.getElementById('currentAPR').textContent = (Number(apr) / 100).toFixed(2) + '%'
      document.getElementById('ownerBalance').textContent = (Number(ethers.formatUnits(balance, 6))).toLocaleString() + ' USDC'

      const now = Math.floor(Date.now() / 1000)
      const finish = Number(periodFinish)
      if (finish < now) {
        document.getElementById('rewardPeriod').innerHTML = '<span class="stat-value red">Ended</span>'
      } else {
        const remaining = finish - now
        const days = Math.floor(remaining / 86400)
        const hours = Math.floor((remaining % 86400) / 3600)
        document.getElementById('rewardPeriod').textContent = `${days}d ${hours}h remaining`
      }

      document.getElementById('protocolStatus').innerHTML = paused
        ? '<span class="stat-value red">⏸ Paused</span>'
        : '<span class="stat-value green">✅ Active</span>'

    } catch (e) {
      console.error(e)
    }
  }

  function updatePreview() {
    const amount = parseFloat(document.getElementById('rewardAmount').value) || 0
    const days = parseFloat(document.getElementById('rewardDays').value) || 0
    const preview = document.getElementById('aprPreview')

    if (!amount || !days) {
      preview.textContent = 'Enter amount and days to preview APR'
      return
    }

    const rewardPerYear = (amount / days) * 365
    const apr100 = (rewardPerYear / 100) * 100
    const apr500 = (rewardPerYear / 500) * 100
    const apr1000 = (rewardPerYear / 1000) * 100

    preview.innerHTML = `
      <strong>${amount} USDC</strong> over <strong>${days} days</strong><br><br>
      <span style="color:#9CA3AF; font-size:12px">
        APR if 100 USDC staked: <strong style="color:#00F0FF">${apr100.toFixed(0)}%</strong> &nbsp;|&nbsp;
        500 USDC: <strong style="color:#00F0FF">${apr500.toFixed(0)}%</strong> &nbsp;|&nbsp;
        1000 USDC: <strong style="color:#00F0FF">${apr1000.toFixed(0)}%</strong>
      </span>
    `
  }

  async function fundRewards() {
    const amount = parseFloat(document.getElementById('rewardAmount').value)
    const days = parseFloat(document.getElementById('rewardDays').value)

    if (!amount || amount <= 0) return showToast('Enter a valid amount', 'error')
    if (!days || days <= 0) return showToast('Enter valid days', 'error')
    if (!signer) return showToast('Connect wallet first', 'error')

    const parsedAmount = ethers.parseUnits(amount.toString(), 6)
    const duration = Math.floor(days * 86400)

    try {
      setBtn('fundBtn', '<span class="spinner"></span> Step 1/2: Approving...', true)

      const usdc = new ethers.Contract(USDC_ADDRESS, ERC20_ABI, signer)
      const approveTx = await usdc.approve(CONTRACT_ADDRESS, parsedAmount)
      showToast('Approving USDC...', 'info', approveTx.hash)
      await approveTx.wait()

      setBtn('fundBtn', '<span class="spinner"></span> Step 2/2: Funding...', true)

      const contract = new ethers.Contract(CONTRACT_ADDRESS, STAKING_ABI, signer)
      const fundTx = await contract.notifyRewardAmount(parsedAmount, duration)
      showToast('Funding rewards...', 'info', fundTx.hash)
      await fundTx.wait()

      showToast(`✅ ${amount} USDC funded for ${days} days!`, 'success', fundTx.hash)
      setBtn('fundBtn', 'Fund Rewards', false)
      await loadStats()

    } catch (e) {
      console.error(e)
      showToast(e.shortMessage || e.reason || 'Transaction failed', 'error')
      setBtn('fundBtn', 'Fund Rewards', false)
    }
  }

  async function pauseProtocol() {
    if (!signer) return showToast('Connect wallet first', 'error')
    try {
      setBtn('pauseBtn', '<span class="spinner"></span>', true)
      const contract = new ethers.Contract(CONTRACT_ADDRESS, STAKING_ABI, signer)
      const tx = await contract.pause()
      await tx.wait()
      showToast('Protocol paused', 'success', tx.hash)
      setBtn('pauseBtn', 'Pause', false)
      await loadStats()
    } catch (e) {
      showToast(e.shortMessage || 'Failed', 'error')
      setBtn('pauseBtn', 'Pause', false)
    }
  }

  async function unpauseProtocol() {
    if (!signer) return showToast('Connect wallet first', 'error')
    try {
      setBtn('unpauseBtn', '<span class="spinner"></span>', true)
      const contract = new ethers.Contract(CONTRACT_ADDRESS, STAKING_ABI, signer)
      const tx = await contract.unpause()
      await tx.wait()
      showToast('Protocol unpaused', 'success', tx.hash)
      setBtn('unpauseBtn', 'Unpause', false)
      await loadStats()
    } catch (e) {
      showToast(e.shortMessage || 'Failed', 'error')
      setBtn('unpauseBtn', 'Unpause', false)
    }
  }

  // Auto-refresh stats every 30s
  setInterval(() => { if (provider) loadStats() }, 30000)
</script>
</body>
</html>
